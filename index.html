<!DOCTYPE html>
<html>
<head>
    <title>Weather Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<button class="toggle" onclick="toggleMode()">🌙</button>

<div class="container">
    <h1>🌦️ Weather App</h1>

    <!-- Search Form -->
    <form method="POST">
        <input type="text" id="cityInput" name="city" placeholder="Enter city..." required>
        <button type="submit">Search</button>
    </form>

    <!-- 📍 Location Button -->
    <button onclick="getLocation()">📍 Use My Location</button>

    {% if weather %}
    <div class="card">
        <h2>{{ weather.city }}</h2>

        <img src="http://openweathermap.org/img/wn/{{ weather.icon }}@2x.png">

        <h1>{{ weather.temp }}°C</h1>
        <p>{{ weather.desc }}</p>
        <p>💧 {{ weather.humidity }}%</p>
    </div>

    <div class="forecast">
        {% for f in forecast %}
        <div class="f-card">
            <img src="http://openweathermap.org/img/wn/{{ f.icon }}.png">
            <p>{{ f.temp }}°C</p>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark");
}

// 📍 Get Location Function
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(showPosition, showError);
    } else {
        alert("Geolocation is not supported by this browser.");
    }
}

// When location is fetched
function showPosition(position) {
    let lat = position.coords.latitude;
    let lon = position.coords.longitude;

    // Send to Flask using query
    window.location.href = `/location?lat=${lat}&lon=${lon}`;
}

// Error handling
function showError(error) {
    alert("Unable to get location. Please allow location access.");
}
</script>

</body>
</html>
